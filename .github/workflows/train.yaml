name: Retrain on New Data

permissions:
  contents: write

on:
  # Trigger 1: automatically when data or pipeline code changes on main
  push:
    branches:
      - main
    paths:
      - 'data/new_data.csv'
      - 'src/**'
      - 'dvc.yaml'
      - 'params.yaml'
      - 'requirements.txt'
      - '.github/workflows/train.yaml'

  # Trigger 2: scheduled pipeline check every Sunday at midnight
  schedule:
    - cron: '0 0 * * 0'

  # Trigger 3: manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure DVC remote credentials
        run: |
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user "${{ secrets.DAGSHUB_USERNAME }}"
          dvc remote modify origin --local password "${{ secrets.DAGSHUB_TOKEN }}"

      - name: Pull data and model artifacts from DagsHub
        run: dvc pull || true

      - name: Run DVC pipeline
        run: dvc repro

      - name: Push updated artifacts to DagsHub
        run: dvc push

      - name: Commit updated lock file and metrics back to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dvc.lock artifacts/metrics/
          git diff --staged --quiet || git commit -m "ci: update dvc.lock and metrics after pipeline run [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send pipeline email notification
        if: ${{ always() }}
        uses: dawidd6/action-send-mail@v17
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[${{ job.status }}] MLOps pipeline - ${{ github.repository }}"
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_FROM }}
          body: |
            Pipeline status: ${{ job.status }}
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Trigger: ${{ github.event_name }}
            Run details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
